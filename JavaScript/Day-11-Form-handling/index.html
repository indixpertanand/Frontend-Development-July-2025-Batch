<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Handling</title>

    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        header{
            text-align: center;
            margin-block: 20px 40px
        }

        form{
            max-width: 400px;
            margin-inline: auto;
            padding: 40px 30px;
            background: #fff;
            box-shadow: 2px 2px 10px rgba(0,0,0,.5);
            border-radius: 10px;
        }
        h2{
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group{margin-bottom: 1.5rem;}
        label{
            display: block;
            margin-bottom: .5rem
        }
        .form-control{
            width: 100%;
            padding: .5rem 1rem
        }
    </style>
</head>
<body>
    <header>

        <h1>Form Handling & validations</h1>
    </header>
    <main>
        <form action="/handle-form" id="userRegistration" method="post">
            <h2>User Registration</h2>
            <div class="form-group">
                <label for="firstName">First Name<span class="required">*</span></label>
                <input class="form-control" type="text" name="firstName" id="firstName">
                <span class="validationFeedback"></span>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name<span class="required">*</span></label>
                <input class="form-control" type="text" name="lastName" id="lastName">
                <span class="validationFeedback"></span>
            </div>
            <div class="form-group">
                <label for="email">Email<span class="required">*</span></label>
                <input class="form-control" type="text" name="email" id="email">
                <span class="validationFeedback"></span>
            </div>
            <div class="form-group">
                <label for="password">Password<span class="required">*</span></label>
                <input class="form-control" type="password" name="password" id="password">
                <span class="validationFeedback"></span>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password<span class="required">*</span></label>
                <input class="form-control" type="password" name="confirmPassword" id="confirmPassword">
                <span class="validationFeedback"></span>
            </div>
            <div class="form-group">
                <label>Skills</label>
                <label for="c"><input id="c" type="checkbox" name="skill" value="C Language"> C Language</label>
                <label for="python"><input id="python" type="checkbox" name="skill" value="Python"> Python </label>
                <label for="html"><input id="html" type="checkbox" name="skill" value="HTML"> HTML </label>
                <label for="css"><input id="css" type="checkbox" name="skill" value="CSS"> CSS </label>
                <span class="skillFeedback"></span>
            </div>
            <button
                type="submit"
                class="btn btn-primary"
            >
                Submit
            </button>
            
        </form>
    </main>

    <script src="./script.js" type="text/javascript"></script>
</body>
</html>
